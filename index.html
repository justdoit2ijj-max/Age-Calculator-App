<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/style.css">
    <link rel="shortcut icon" href="assets/images/favicon-32x32.png" type="image/x-icon">
    <script type="module" src="src/main.js"></script>
    <title>Age Calculator App</title>
</head>

<body>
    <main class="calculator" aria-label="Age calculator">
        <div class="date-fields">
            <div class="field">
                <label for="day-input">DAY</label>
                <input type="number" placeholder="DD" id="day-input" min="1" max="31">
                <span class="error-message" id="day-error"></span>
            </div>
            <div class="field">
                <label for="month-input">MONTH</label>
                <input type="number" placeholder="MM" id="month-input" min="1" max="12">
                <span class="error-message" id="month-error"></span>
            </div>
            <div class="field">
                <label for="year-input">YEAR</label>
                <input type="number" placeholder="YYYY" id="year-input" min="1">
                <span class="error-message" id="year-error"></span>
            </div>
        </div>

        <div class="submit-row">
            <div class="divider"></div>
            <button type="button" id="submit" aria-label="Calculate age">
                <img src="assets/images/icon-arrow.svg" alt="">
            </button>
        </div>

        <div class="results" aria-live="polite">
            <p><span id="year-output">--</span> years</p>
            <p><span id="month-output">--</span> months</p>
            <p><span id="day-output">--</span> days</p>
        </div>
    </main>
</body>

</html>
