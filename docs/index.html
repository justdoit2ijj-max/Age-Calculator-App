<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/favicon-32x32-DQjEQYWa.png" type="image/x-icon">
    <title>Age Calculator App</title>
  <script type="module" crossorigin src="./assets/index-DS1xUrkr.js"></script>
  <link rel="stylesheet" crossorigin href="./assets/index-DbsoBnVl.css">
</head>

<body>
    <main class="calculator" aria-label="Age calculator">
        <div class="date-fields">
            <div class="field">
                <label for="day-input">DAY</label>
                <input type="number" placeholder="DD" id="day-input" min="1" max="31">
                <span class="error-message" id="day-error"></span>
            </div>
            <div class="field">
                <label for="month-input">MONTH</label>
                <input type="number" placeholder="MM" id="month-input" min="1" max="12">
                <span class="error-message" id="month-error"></span>
            </div>
            <div class="field">
                <label for="year-input">YEAR</label>
                <input type="number" placeholder="YYYY" id="year-input" min="1">
                <span class="error-message" id="year-error"></span>
            </div>
        </div>

        <div class="submit-row">
            <div class="divider"></div>
            <button type="button" id="submit" aria-label="Calculate age">
                <img src="data:image/svg+xml,%3csvg%20xmlns='http://www.w3.org/2000/svg'%20width='46'%20height='44'%20viewBox='0%200%2046%2044'%3e%3cg%20fill='none'%20stroke='%23FFF'%20stroke-width='2'%3e%3cpath%20d='M1%2022.019C8.333%2021.686%2023%2025.616%2023%2044M23%2044V0M45%2022.019C37.667%2021.686%2023%2025.616%2023%2044'/%3e%3c/g%3e%3c/svg%3e" alt="">
            </button>
        </div>

        <div class="results" aria-live="polite">
            <p><span id="year-output">--</span> years</p>
            <p><span id="month-output">--</span> months</p>
            <p><span id="day-output">--</span> days</p>
        </div>
    </main>
</body>

</html>
